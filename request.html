<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シフト作るくん - 休み希望</title>
    <!-- プレミアムなデザインのためのフォント読み込み -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- ヘッダー -->
        <header class="glass-header">
            <div class="header-content">
                <div class="header-titles">
                    <h1>シフト作るくん</h1>
                    <span class="subtitle">休み希望入力</span>
                </div>
            </div>

            <nav class="top-nav">
                <a href="top.html" class="nav-btn">トップ</a>
                <a href="index.html" class="nav-btn">月行事</a>
                <a href="staff.html" class="nav-btn">スタッフ</a>
                <a href="request.html" class="nav-btn active">休み希望</a>
                <a href="generate.html" class="nav-btn">シフト表</a>
            </nav>
        </header>

        <!-- メインコンテンツ -->
        <main class="main-content">
            <!-- 月選択コントロール (index.htmlと共通のUI) -->
            <div class="month-control glass-panel">
                <button id="prev-month" class="icon-btn" aria-label="前の月">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <div class="month-display">
                    <h2 id="current-month-display">--年 --月度</h2>
                    <p id="period-display" class="period-text">--月--日 〜 --月--日</p>
                </div>
                <button id="next-month" class="icon-btn" aria-label="次の月">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
            </div>

            <!-- 休み希望テーブル -->
            <div class="request-table-wrapper glass-panel">
                <table class="request-table" id="request-table">
                    <!-- JSでテーブルを生成 -->
                </table>
            </div>
        </main>
    </div>

    <!-- トースト通知 -->
    <div id="toast" class="toast hidden">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
        <span id="toast-message">保存しました</span>
    </div>

    <script src="request.js"></script>
</body>

</html>
